# Self-hosted stack: Next.js app + PostgreSQL for production-like runs.
#
# Publishing (hosted DB e.g. Neon): build and run only the web image with DATABASE_URL set.
# The container entrypoint runs `prisma migrate deploy` before `node server.js`.
# To skip migrations (not recommended): set SKIP_PRISMA_MIGRATE=true
#   docker build -t webroker .
#   docker run --rm -p 3000:3000 \
#     -e DATABASE_URL="postgresql://..." \
#     -e NEXTAUTH_SECRET="..." \
#     -e NEXTAUTH_URL="https://your-domain.com" \
#     webroker
#
# First-time schema against the compose Postgres (from your host; Postgres exposed on 5432).
# The web container normally runs migrations on startup; or apply once manually:
#   DATABASE_URL="postgresql://webroker:webroker@127.0.0.1:5432/webroker?sslmode=disable" npm run db:migrate
#
# Port 3000 already in use (e.g. `next dev`)? Use another host port and set NEXTAUTH_URL to match:
#   WEB_PORT=3001 NEXTAUTH_URL=http://localhost:3001 docker compose up --build
# Or: npm run docker:up:3001

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://webroker:webroker@db:5432/webroker?sslmode=disable
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-long-random-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-WeBroker <onboarding@resend.dev>}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: webroker
      POSTGRES_PASSWORD: webroker
      POSTGRES_DB: webroker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webroker -d webroker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
